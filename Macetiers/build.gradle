plugins {
    id 'java'
    id 'fabric-loom' version '1.7-SNAPSHOT'
}

group = 'com.macetiers'
version = '1.0.0'

repositories {
    mavenCentral()
    maven { url = 'https://maven.fabricmc.net/' }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.7"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.11"
    modImplementation "dev.onyxstudios.cardinal-components-api:cardinal-components-base:6.0.0"
    modImplementation "dev.onyxstudios.cardinal-components-api:cardinal-components-entity:6.0.0"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
